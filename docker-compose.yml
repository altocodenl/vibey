services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    network_mode: bridge

  vibey:
    build: .
    ports:
      - "5353:5353"
      - "1455:1455"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - vibey-data:/app/data
    labels:
      - vibey=master
    environment:
      - VIBEY_DOCKER=1
      - REDIS_HOST=host.docker.internal
      # Set VIBEY_CLOUD=1 to enable cloud mode (auth, user scoping, etc.)
      # - VIBEY_CLOUD=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: bridge

volumes:
  vibey-data:
  redis-data:
