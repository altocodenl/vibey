services:
  vibey-host:
    build:
      context: .
      dockerfile: Dockerfile.vibey-host
    image: vibey-project:latest
    ports:
      - "5353:5353"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - vibey-host:/app/data
    environment:
      - CLOUD

  vibey-project:
    build:
      context: .
      dockerfile: Dockerfile.vibey-project
    image: vibey-project:latest
    deply:
      replicas: 0

volumes:
  vibey-host:
